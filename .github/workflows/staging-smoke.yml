name: Staging Smoke

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - release-candidate
      - docs-contract-changed
      - task-unlocked

permissions:
  actions: read
  contents: read

jobs:
  smoke:
    runs-on:
      group: livemask-staging
      labels: [self-hosted, linux, livemask, docker, staging]
    steps:
      - uses: actions/checkout@v4
      - name: Show runner
        run: |
          hostname
          whoami
          docker --version
          docker compose version
      - name: Start staging
        run: docker compose -f infra/docker-compose.staging.yml up -d --build
      - name: Smoke
        run: bash scripts/smoke.sh
      - name: Stop staging
        if: always()
        run: docker compose -f infra/docker-compose.staging.yml down --remove-orphans

  notify-lark:
    needs: [smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify Lark
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LARK_BOT_WEBHOOK: ${{ secrets.LARK_BOT_WEBHOOK }}
          LARK_BOT_SECRET: ${{ secrets.LARK_BOT_SECRET }}
          WORKFLOW_RESULT: >-
            ${{
              contains(needs.*.result, 'failure') && 'failure'
              || contains(needs.*.result, 'cancelled') && 'cancelled'
              || 'success'
            }}
        run: bash .github/scripts/lark-notify.sh "$WORKFLOW_RESULT"
