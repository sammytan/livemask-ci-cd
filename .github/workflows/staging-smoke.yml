name: Staging Smoke

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      backend_ref:
        description: Backend ref to build for smoke. Must be dev.
        required: false
        default: dev
      keep_alive:
        description: Keep containers running on failure for SSH debugging
        required: false
        default: 'false'
  repository_dispatch:
    types:
      - staging-promote

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  smoke:
    env:
      BACKEND_REF: dev
      JOB_SERVICE_REF: dev
      ADMIN_REF: dev
      WEBSITE_REF: dev
      LIVEMASK_STACK_NAME: livemask-smoke
      LIVEMASK_BACKEND_HTTP_PORT: "28080"
      LIVEMASK_ADMIN_PORT: "23001"
      LIVEMASK_WEBSITE_PORT: "23002"
      LIVEMASK_JOB_SERVICE_PORT: "29191"
      POSTGRES_PORT: "25432"
      REDIS_PORT: "26379"
    runs-on:
      group: livemask-staging
      labels: [self-hosted, Linux, livemask, docker, staging]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.LIVEMASK_BOT_TOKEN || github.token }}
      - name: Enforce dev-only smoke refs
        run: bash scripts/validate-dev-ref.sh
      - name: Strict cross-repo Issue sync check (TASK-CICD-ISSUE-SYNC-STRICT-001)
        env:
          GITHUB_TOKEN: ${{ secrets.LIVEMASK_BOT_TOKEN || github.token }}
        run: >-
          bash scripts/issue-sync-strict.sh
          --task-id TASK-CICD-ISSUE-SYNC-STRICT-001
          --repo livemask-ci-cd
          --docs-required false
          --missing-runtime warn
      - name: Diagnose CI runner (TASK-CICD-RUNNER-BACKLOG-001)
        run: bash scripts/diagnose-ci-runner.sh
        continue-on-error: true
      - name: Restart CI runner if stuck (TASK-CICD-RUNNER-BACKLOG-001)
        run: bash scripts/restart-ci-runner.sh
        continue-on-error: true
      - name: Show runner
        run: |
          hostname
          whoami
          docker --version
          docker compose version
          echo "Ephemeral smoke port mapping:"
          echo "  host 28080 -> backend container 8080"
          echo "  host 23001 -> admin container 3000"
          echo "  host 23002 -> website container 3000"
          echo "  host 29191 -> job-service container 19191"
          echo "  host 25432 -> postgres container 5432"
          echo "  host 26379 -> redis container 6379"
      - name: Checkout backend source into build context
        uses: actions/checkout@v4
        with:
          repository: MyAiDevs/livemask-backend
          ref: ${{ env.BACKEND_REF }}
          path: infra/_build_deps/backend
          token: ${{ secrets.LIVEMASK_BOT_TOKEN || github.token }}
      - name: Checkout job-service source into build context
        uses: actions/checkout@v4
        with:
          repository: MyAiDevs/livemask-job-service
          ref: ${{ env.JOB_SERVICE_REF }}
          path: infra/_build_deps/job-service
          token: ${{ secrets.LIVEMASK_BOT_TOKEN || github.token }}
      - name: Checkout admin source into build context
        uses: actions/checkout@v4
        with:
          repository: MyAiDevs/livemask-admin
          ref: ${{ env.ADMIN_REF }}
          path: infra/_build_deps/admin
          token: ${{ secrets.LIVEMASK_BOT_TOKEN || github.token }}
      - name: Checkout website source into build context
        uses: actions/checkout@v4
        with:
          repository: MyAiDevs/livemask-website
          ref: ${{ env.WEBSITE_REF }}
          path: infra/_build_deps/website
          token: ${{ secrets.LIVEMASK_BOT_TOKEN || github.token }}
      - name: Prepare staging build context
        run: bash scripts/prepare-staging-build-context.sh --ci
      - name: Start staging
        run: docker compose -f infra/docker-compose.staging.yml up -d --build
      - name: Collect runtime status
        continue-on-error: true
        run: |
          mkdir -p /tmp/livemask-runtime
          bash scripts/dev-runtime-status.sh \
            --compose infra/docker-compose.staging.yml \
            --env staging \
            --output /tmp/livemask-runtime/status.json
          echo "Runtime status collected"
      - name: Smoke
        run: bash scripts/smoke.sh
      - name: Node full-link smoke (TASK-CICD-NODE-001)
        run: bash scripts/node-smoke.sh
      - name: Billing/Device full-link smoke (TASK-CICD-BILLING-001)
        run: bash scripts/billing-smoke.sh
      - name: Connect Session full-link smoke (TASK-CICD-CONNECT-001)
        run: bash scripts/connect-smoke.sh
      - name: GeoIP full-link smoke (TASK-CICD-GEOIP-001)
        run: bash scripts/geoip-smoke.sh
      - name: GeoIP Credentials smoke (TASK-CICD-GEOIP-CREDENTIALS-001)
        run: bash scripts/geoip-credentials-smoke.sh
      - name: Growth Revenue & Reward Notification & User Profile Growth Fields smoke (TASK-CICD-USER-GROWTH-REVENUE-001 / TASK-CICD-GROWTH-REWARD-NOTIFICATION-001 / TASK-CICD-USER-PROFILE-GROWTH-FIELDS-SMOKE-001)
        run: bash scripts/growth-revenue-smoke.sh
      - name: Release Control smoke (TASK-CICD-RELEASE-CONTROL-SMOKE-001)
        run: bash scripts/release-control-smoke.sh
      - name: Generate Backend Endpoint Gap Matrix & Definition Drift Report (TASK-CICD-JOBS-DRIFT-AND-GAP-SMOKE-001)
        continue-on-error: true
        working-directory: infra/_build_deps/job-service
        run: |
          echo "=== Generating backend-endpoint-gap-matrix.json ==="
          go test -run TestClassifier_OutputMatrix ./internal/... 2>&1 || echo "WARN: gap matrix generation skipped"
          echo "=== Generating definition-drift-report.json ==="
          go test -run TestDefinitionDrift_OutputJSON ./internal/... 2>&1 || echo "WARN: drift report generation skipped"
          echo "=== Checking artifacts ==="
          ls -la /tmp/backend-endpoint-gap-matrix.json /tmp/definition-drift-report.json 2>/dev/null || echo "WARN: artifacts not found at /tmp/"
      - name: Job Service smoke (TASK-CICD-JOBS-001 / TASK-CICD-JOBS-DRIFT-AND-GAP-SMOKE-001)
        run: bash scripts/jobs-smoke.sh
      - name: Admin Dashboard smoke (TASK-CICD-DASHBOARD-REALTIME-001)
        run: bash scripts/dashboard-smoke.sh
      - name: Protocol & Endpoint Template Rollout smoke (TASK-CICD-PROTOCOL-ENDPOINT-ROLLOUT-001)
        run: bash scripts/protocol-endpoint-smoke.sh
      - name: Protocol & Endpoint Capability smoke (TASK-CICD-PROTOCOL-CAPABILITY-001)
        run: bash scripts/protocol-capability-smoke.sh
      - name: NodeAgent Release smoke (TASK-CICD-NODEAGENT-RELEASE-001)
        run: bash scripts/nodeagent-release-smoke.sh
      - name: Website Blog smoke (TASK-CICD-WEBSITE-001)
        run: bash scripts/website-smoke.sh
      - name: System Settings & Scheduler smoke (TASK-CICD-SYSTEM-SETTINGS-SCHEDULER-001)
        run: bash scripts/system-settings-smoke.sh
      - name: App Release smoke (TASK-CICD-APP-RELEASE-001)
        run: bash scripts/app-release-smoke.sh
      - name: Sentry Config smoke (TASK-CICD-SENTRY-CONFIG-SMOKE-001)
        run: bash scripts/sentry-config-smoke.sh
      - name: Observability smoke (TASK-CICD-OBSERVABILITY-SMOKE-001)
        run: bash scripts/observability-smoke.sh
      - name: I18n Language smoke (TASK-CICD-I18N-LANGUAGE-SMOKE-001)
        run: bash scripts/i18n-smoke.sh
      - name: Bandwidth Auto-Reconnect smoke (TASK-CICD-BANDWIDTH-AUTO-RECONNECT-SMOKE-001)
        run: bash scripts/bandwidth-auto-reconnect-smoke.sh
      - name: Traffic Analytics V2 smoke (TASK-CICD-TRAFFIC-ANALYTICS-V2-SMOKE-001)
        run: bash scripts/traffic-analytics-v2-smoke.sh
      - name: Admin Nav IA smoke (TASK-CICD-ADMIN-NAV-IA-001)
        run: bash scripts/admin-nav-ia-smoke.sh
      - name: Jobs Hardening smoke (TASK-CICD-JOBS-HARDENING-001)
        run: bash scripts/jobs-hardening-smoke.sh
      - name: NodeAgent Config Sync smoke (TASK-CICD-NODEAGENT-CONFIG-SMOKE-001)
        run: bash scripts/nodeagent-config-smoke.sh
      - name: NodeAgent Speedtest & Bandwidth smoke (TASK-CICD-NODEAGENT-SPEEDTEST-BANDWIDTH-001)
        run: bash scripts/nodeagent-speedtest-smoke.sh
      - name: NAT Sharing Guard smoke (TASK-CICD-NAT-SHARING-GUARD-001)
        run: bash scripts/nat-sharing-smoke.sh
      - name: OpenAPI Drift Check (TASK-CICD-OPENAPI-DRIFT-CHECK-001)
        run: bash scripts/openapi-drift-smoke.sh
      - name: Real Data Closed Loop smoke (TASK-CICD-REAL-DATA-CLOSED-LOOP-SMOKE-001)
        run: bash scripts/real-data-closed-loop-smoke.sh
      - name: Jobs Real Data smoke (TASK-CICD-JOBS-REAL-DATA-SMOKE-001)
        run: bash scripts/jobs-real-data-smoke.sh
      - name: Node Status Freshness smoke (TASK-CICD-NODE-STATUS-FRESHNESS-SMOKE-001)
        run: bash scripts/node-status-freshness-smoke.sh
      - name: App Runtime Governance smoke (TASK-CICD-APP-RUNTIME-GOVERNANCE-SMOKE-001)
        run: bash scripts/app-runtime-governance-smoke.sh
      - name: Protocol Parity smoke (TASK-CICD-PROTOCOL-PARITY-SMOKE-001)
        run: bash scripts/protocol-parity-smoke.sh
      - name: Log Retention smoke (TASK-CICD-LOG-RETENTION-SMOKE-001)
        run: bash scripts/log-retention-smoke.sh
      - name: Admin Nodes UX smoke (TASK-CICD-ADMIN-NODES-UX-SMOKE-001)
        run: bash scripts/admin-nodes-ux-smoke.sh
      - name: Website i18n Announcement smoke (TASK-CICD-WEBSITE-I18N-ANNOUNCEMENT-SMOKE-001)
        run: bash scripts/website-i18n-announcement-smoke.sh
      - name: Secret Leak Standard smoke (TASK-CICD-SECRET-LEAK-STANDARD-SMOKE-001)
        run: bash scripts/secret-leak-standard-smoke.sh
      - name: Upload runtime status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-status
          path: /tmp/livemask-runtime/status.json
          retention-days: 1
      - name: Create or update Cursor triage issue on smoke failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.LIVEMASK_BOT_TOKEN || github.token }}
          AUTO_CREATE_STAGING_SMOKE_ISSUE: "true"
          RUNTIME_STATUS_FILE: /tmp/livemask-runtime/status.json
        run: bash scripts/create-staging-smoke-failure-issue.sh
      - name: Issue Close Guard — dry-run evaluation (TASK-CICD-ISSUE-CLOSE-GUARD-001)
        id: issue-close-guard
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.LIVEMASK_BOT_TOKEN || github.token }}
          LIVEMASK_WORKSPACE_ROOT: /opt/actions-runner
        run: |
          # Dry-run evaluation of a known-completed task to verify guard logic.
          # Use .github/workflows/issue-close-guard.yml (workflow_dispatch) with
          # --write to actually close/reopen issues.
          echo "=== Dry-run: completed task should allow close ==="
          bash scripts/issue-close-guard.sh \
            --task-id TASK-CICD-ISSUE-SYNC-STRICT-001 \
            --repo livemask-ci-cd \
            --dry-run \
            --format text || true
          echo ""
          echo "=== Dry-run: blocked task should NOT allow close ==="
          bash scripts/issue-close-guard.sh \
            --task-id TASK-CICD-ISSUE-CLOSE-GUARD-001 \
            --repo livemask-ci-cd \
            --dry-run \
            --format text || true
      - name: Mark failure for keep_alive
        if: failure()
        run: |
          mkdir -p /tmp/livemask-runtime
          echo "true" > /tmp/livemask-runtime/keep_alive_marker

      - name: Stop staging
        if: always()
        run: |
          # Check keep_alive from event payload (only set on workflow_dispatch)
          ka="false"
          if [[ -f "$GITHUB_EVENT_PATH" ]]; then
            raw=$(python3 -c "import json, os; p=os.environ.get('GITHUB_EVENT_PATH'); data=json.load(open(p)); print(str(data.get('inputs', {}).get('keep_alive', 'false')).strip())" 2>/dev/null) || raw="false"
            ka=$(echo "${raw}" | tr -d '[:space:]')
          fi
          echo "keep_alive='${ka}'"
          if [[ "${ka}" == "true" && -f /tmp/livemask-runtime/keep_alive_marker ]]; then
            echo "=== KEEP_ALIVE enabled — containers left running for SSH debugging ==="
            echo ""
            echo "SSH to monitoring-stack and inspect:"
            echo "  docker ps --filter name=livemask-staging"
            echo "  docker compose -f infra/docker-compose.staging.yml logs --tail=50 <service>"
            echo "  docker compose -f infra/docker-compose.staging.yml down --remove-orphans"
            exit 0
          fi
          echo "=== Stopping staging containers ==="
          docker compose -f infra/docker-compose.staging.yml down --remove-orphans

  notify-lark:
    needs: [smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.LIVEMASK_BOT_TOKEN || github.token }}
      - name: Download runtime status artifact
        uses: actions/download-artifact@v4
        with:
          name: runtime-status
          path: /tmp/livemask-runtime/
        continue-on-error: true
      - name: Determine workflow result
        id: result
        run: |
          # Derive result from job outcome
          if [[ "${{ needs.smoke.result }}" == "cancelled" ]]; then
            echo "result=cancelled" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.smoke.result }}" == "success" ]]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi
      - name: Notify Lark with runtime evidence
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LARK_BOT_WEBHOOK: ${{ secrets.LARK_BOT_WEBHOOK }}
          LARK_BOT_SECRET: ${{ secrets.LARK_BOT_SECRET }}
          RUNTIME_ENV: staging
          WORKFLOW_RESULT: ${{ steps.result.outputs.result }}
        run: |
          if [[ -f /tmp/livemask-runtime/status.json ]]; then
            bash .github/scripts/lark-runtime-notify.sh "${WORKFLOW_RESULT}" /tmp/livemask-runtime/status.json
          else
            bash .github/scripts/lark-runtime-notify.sh "${WORKFLOW_RESULT}"
          fi
