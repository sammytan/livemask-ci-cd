name: Staging Smoke

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - release-candidate
      - docs-contract-changed

jobs:
  smoke:
    runs-on:
      group: livemask-staging
      labels: [self-hosted, linux, livemask, docker, staging]
    steps:
      - uses: actions/checkout@v4
      - name: Show runner
        run: |
          hostname
          whoami
          docker --version
          docker compose version
      - name: Start staging
        run: docker compose -f infra/docker-compose.staging.yml up -d
      - name: Smoke
        run: bash scripts/smoke.sh

  notify-lark:
    needs: [smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify Lark
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LARK_BOT_WEBHOOK: ${{ secrets.LARK_BOT_WEBHOOK }}
          LARK_BOT_SECRET: ${{ secrets.LARK_BOT_SECRET }}
          WORKFLOW_RESULT: ${{ needs.smoke.result }}
        run: bash .github/scripts/lark-notify.sh "$WORKFLOW_RESULT"
