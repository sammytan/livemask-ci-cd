name: Staging Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Local-only full smoke notice
        run: |
          echo "Full-link smoke is intentionally local-only."
          echo "Do not run the full smoke suite on GitHub Actions."
          echo ""
          echo "Run locally from livemask-ci-cd:"
          echo "  bash scripts/local-full-smoke.sh --start"
          echo ""
          echo "For lightweight GitHub checks, rely on Workflow Syntax Guard and repo-native build/test workflows."

  notify-lark:
    needs: [smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: No-op notification
        run: |
          echo "No Lark runtime notification: full-link smoke runs only in local runtime."
