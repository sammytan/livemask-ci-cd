name: Staging Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      backend_ref:
        description: Backend ref to build for staging smoke
        required: false
        default: main
  repository_dispatch:
    types:
      - staging-promote

permissions:
  actions: read
  contents: read

jobs:
  smoke:
    env:
      BACKEND_REF: ${{ github.event.client_payload.ref || inputs.backend_ref || 'main' }}
    runs-on:
      group: livemask-staging
      labels: [self-hosted, linux, livemask, docker, staging]
    steps:
      - uses: actions/checkout@v4
      - name: Show runner
        run: |
          hostname
          whoami
          docker --version
          docker compose version
      - name: Start staging
        run: docker compose -f infra/docker-compose.staging.yml up -d --build
      - name: Smoke
        run: bash scripts/smoke.sh
      - name: Node full-link smoke (TASK-CICD-NODE-001)
        run: bash scripts/node-smoke.sh
      - name: Billing/Device full-link smoke (TASK-CICD-BILLING-001)
        run: bash scripts/billing-smoke.sh
      - name: Connect Session full-link smoke (TASK-CICD-CONNECT-001)
        run: bash scripts/connect-smoke.sh
      - name: GeoIP full-link smoke (TASK-CICD-GEOIP-001)
        run: bash scripts/geoip-smoke.sh
      - name: GeoIP Credentials smoke (TASK-CICD-GEOIP-CREDENTIALS-001)
        run: bash scripts/geoip-credentials-smoke.sh
      - name: Stop staging
        if: always()
        run: docker compose -f infra/docker-compose.staging.yml down --remove-orphans

  notify-lark:
    needs: [smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify Lark
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LARK_BOT_WEBHOOK: ${{ secrets.LARK_BOT_WEBHOOK }}
          LARK_BOT_SECRET: ${{ secrets.LARK_BOT_SECRET }}
          WORKFLOW_RESULT: >-
            ${{
              contains(needs.*.result, 'failure') && 'failure'
              || contains(needs.*.result, 'cancelled') && 'cancelled'
              || 'success'
            }}
        run: bash .github/scripts/lark-notify.sh "$WORKFLOW_RESULT"
