name: Dev Runtime Deploy

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: livemask-dev-runtime
  cancel-in-progress: true

jobs:
  deploy:
    env:
      BACKEND_REF: dev
      JOB_SERVICE_REF: dev
      ADMIN_REF: dev
      WEBSITE_REF: dev
      NODEAGENT_REF: dev
      LIVEMASK_STACK_NAME: livemask-dev
      LIVEMASK_BACKEND_HTTP_PORT: "18080"
      LIVEMASK_ADMIN_PORT: "3001"
      LIVEMASK_WEBSITE_PORT: "3002"
      LIVEMASK_NODEAGENT_PORT: "19090"
      LIVEMASK_JOB_SERVICE_PORT: "19191"
      POSTGRES_PORT: "15432"
      REDIS_PORT: "16379"
      LIVEMASK_PUBLIC_HOST: "47.243.128.122"
      PUBLIC_API_BASE_URL: "http://47.243.128.122:18080"
      CORS_ALLOWED_ORIGINS: "http://47.243.128.122:3001,http://47.243.128.122:3002,http://127.0.0.1:3001,http://127.0.0.1:3002,http://localhost:3001,http://localhost:3002"
    runs-on:
      group: livemask-staging
      labels: [self-hosted, Linux, livemask, docker, staging]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.LIVEMASK_BOT_TOKEN || github.token }}

      - name: Checkout backend source into build context
        uses: actions/checkout@v4
        with:
          repository: MyAiDevs/livemask-backend
          ref: ${{ env.BACKEND_REF }}
          path: infra/_build_deps/backend
          token: ${{ secrets.LIVEMASK_BOT_TOKEN || github.token }}

      - name: Checkout job-service source into build context
        uses: actions/checkout@v4
        with:
          repository: MyAiDevs/livemask-job-service
          ref: ${{ env.JOB_SERVICE_REF }}
          path: infra/_build_deps/job-service
          token: ${{ secrets.LIVEMASK_BOT_TOKEN || github.token }}

      - name: Checkout admin source into build context
        uses: actions/checkout@v4
        with:
          repository: MyAiDevs/livemask-admin
          ref: ${{ env.ADMIN_REF }}
          path: infra/_build_deps/admin
          token: ${{ secrets.LIVEMASK_BOT_TOKEN || github.token }}

      - name: Checkout website source into build context
        uses: actions/checkout@v4
        with:
          repository: MyAiDevs/livemask-website
          ref: ${{ env.WEBSITE_REF }}
          path: infra/_build_deps/website
          token: ${{ secrets.LIVEMASK_BOT_TOKEN || github.token }}

      - name: Checkout nodeagent source into build context
        uses: actions/checkout@v4
        with:
          repository: MyAiDevs/livemask-nodeagent
          ref: ${{ env.NODEAGENT_REF }}
          path: infra/_build_deps/nodeagent
          token: ${{ secrets.LIVEMASK_BOT_TOKEN || github.token }}

      - name: Prepare dev runtime build context
        run: bash scripts/prepare-staging-build-context.sh --ci

      - name: Show current runtime port owners
        run: |
          echo "Host port mapping used by persistent dev runtime:"
          echo "  host 18080 -> backend container 8080"
          echo "  host 3001 -> admin container 3000"
          echo "  host 3002 -> website container 3000"
          echo "  host 19090 -> nodeagent container 9100"
          echo "  host 19191 -> job-service container 19191"
          echo "  host 15432 -> postgres container 5432"
          echo "  host 16379 -> redis container 6379"
          echo "Browser-facing dev runtime URLs:"
          echo "  backend public API: ${PUBLIC_API_BASE_URL}"
          echo "  admin public URL:   http://${LIVEMASK_PUBLIC_HOST}:${LIVEMASK_ADMIN_PORT}"
          echo "  website public URL: http://${LIVEMASK_PUBLIC_HOST}:${LIVEMASK_WEBSITE_PORT}"
          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' || true

      - name: Start persistent dev runtime
        run: docker compose -f infra/docker-compose.staging.yml up -d --build

      - name: Collect runtime status
        if: always()
        run: |
          mkdir -p /tmp/livemask-runtime
          bash scripts/dev-runtime-status.sh \
            --compose infra/docker-compose.staging.yml \
            --env dev \
            --output /tmp/livemask-runtime/status.json

      - name: Verify dev backend health
        run: |
          echo "Checking host URL http://127.0.0.1:${LIVEMASK_BACKEND_HTTP_PORT}/api/v1/health"
          echo "This maps to backend container port 8080."
          curl -fsS "http://127.0.0.1:${LIVEMASK_BACKEND_HTTP_PORT}/api/v1/health"

      - name: Verify dev frontend routes
        run: |
          check_url() {
            local name="$1"
            local url="$2"
            local code=""
            for attempt in $(seq 1 30); do
              code=$(curl -sS --max-time 3 -o /dev/null -w "%{http_code}" "${url}" 2>/dev/null || echo "000")
              case "${code}" in
                200|301|302|307|308)
                  echo "${name} reachable: HTTP ${code} (${url})"
                  return 0
                  ;;
              esac
              echo "Waiting for ${name}... attempt ${attempt}/30, HTTP ${code}"
              sleep 2
            done
            echo "${name} unavailable after waiting: HTTP ${code} (${url})" >&2
            return 1
          }

          check_url "admin" "http://127.0.0.1:${LIVEMASK_ADMIN_PORT}/login"
          check_url "website" "http://127.0.0.1:${LIVEMASK_WEBSITE_PORT}/"

          echo "Checking admin runtime proxy can reach backend"
          admin_login_code=$(curl -sS --max-time 5 -o /tmp/livemask-admin-login.json -w "%{http_code}" \
            -X POST "http://127.0.0.1:${LIVEMASK_ADMIN_PORT}/admin/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"request_id":"dev-runtime-admin-proxy-smoke","email":"admin@livemask.dev","password":"AdminPass123!","client_type":"admin"}' || echo "000")
          if [[ "${admin_login_code}" != "200" ]]; then
            echo "FAIL: admin runtime proxy login returned HTTP ${admin_login_code}" >&2
            cat /tmp/livemask-admin-login.json >&2 || true
            exit 1
          fi
          echo "admin runtime proxy login reachable: HTTP ${admin_login_code}"

          admin_token=$(python3 -c 'import json,sys; print(json.load(open("/tmp/livemask-admin-login.json")).get("access_token", ""))')
          if [[ -z "${admin_token}" ]]; then
            echo "FAIL: admin runtime proxy login did not return an access token" >&2
            cat /tmp/livemask-admin-login.json >&2 || true
            exit 1
          fi
          jobs_code=$(curl -sS --max-time 5 -o /tmp/livemask-admin-jobs.json -w "%{http_code}" \
            -H "Authorization: Bearer ${admin_token}" \
            "http://127.0.0.1:${LIVEMASK_ADMIN_PORT}/admin/api/v1/jobs" || echo "000")
          if [[ "${jobs_code}" != "200" ]]; then
            echo "FAIL: admin jobs gateway returned HTTP ${jobs_code}" >&2
            cat /tmp/livemask-admin-jobs.json >&2 || true
            exit 1
          fi
          echo "admin jobs gateway reachable: HTTP ${jobs_code}"

      - name: Verify browser-facing dev runtime config
        run: |
          echo "Checking website bundle does not point browser clients at 127.0.0.1:${LIVEMASK_BACKEND_HTTP_PORT}"
          if docker compose -f infra/docker-compose.staging.yml exec -T website sh -lc "grep -R \"127.0.0.1:${LIVEMASK_BACKEND_HTTP_PORT}\" -n /usr/share/nginx/html >/tmp/livemask-localhost-api.txt 2>/dev/null"; then
            echo "FAIL: website bundle still contains browser-facing localhost API URL"
            docker compose -f infra/docker-compose.staging.yml exec -T website sh -lc "cat /tmp/livemask-localhost-api.txt | head -20" || true
            exit 1
          fi
          echo "PASS: website bundle does not contain browser-facing localhost API URL"

          code=$(curl -sS --max-time 5 -o /dev/null -w "%{http_code}" \
            -X OPTIONS "http://127.0.0.1:${LIVEMASK_BACKEND_HTTP_PORT}/api/v1/content/website?locale=en-US" \
            -H "Origin: http://${LIVEMASK_PUBLIC_HOST}:${LIVEMASK_WEBSITE_PORT}" \
            -H "Access-Control-Request-Method: GET" || echo "000")
          if [[ "${code}" != "200" && "${code}" != "204" ]]; then
            echo "FAIL: CORS preflight returned HTTP ${code}"
            exit 1
          fi
          echo "PASS: CORS preflight from website public origin returned HTTP ${code}"

      - name: Upload runtime status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-runtime-status
          path: /tmp/livemask-runtime/status.json
          retention-days: 3

  notify-lark:
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.LIVEMASK_BOT_TOKEN || github.token }}

      - name: Download runtime status artifact
        uses: actions/download-artifact@v4
        with:
          name: dev-runtime-status
          path: /tmp/livemask-runtime/
        continue-on-error: true

      - name: Determine workflow result
        id: result
        run: |
          if [[ "${{ needs.deploy.result }}" == "cancelled" ]]; then
            echo "result=cancelled" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Lark with dev runtime evidence
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LARK_BOT_WEBHOOK: ${{ secrets.LARK_BOT_WEBHOOK }}
          LARK_BOT_SECRET: ${{ secrets.LARK_BOT_SECRET }}
          RUNTIME_ENV: dev
          WORKFLOW_RESULT: ${{ steps.result.outputs.result }}
        run: |
          if [[ -f /tmp/livemask-runtime/status.json ]]; then
            bash .github/scripts/lark-runtime-notify.sh "${WORKFLOW_RESULT}" /tmp/livemask-runtime/status.json
          else
            bash .github/scripts/lark-runtime-notify.sh "${WORKFLOW_RESULT}"
          fi
