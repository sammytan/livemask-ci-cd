# Reusable Go Build Workflow for LiveMask
# Usage:
# jobs:
#   build:
#     uses: sammytan/livemask-ci-cd/.github/workflows/reusable-go-build.yml@main
#     with:
#       go-version: '1.23'

name: Reusable Go Build

on:
  workflow_call:
    inputs:
      go-version:
        required: true
        type: string
    secrets:
      LARK_BOT_WEBHOOK:
        required: false
      LARK_BOT_SECRET:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
      - run: go mod download
      - run: go build ./...
      - run: go test ./...

  notify-lark:
    needs: [build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify Lark
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LARK_BOT_WEBHOOK: ${{ secrets.LARK_BOT_WEBHOOK }}
          LARK_BOT_SECRET: ${{ secrets.LARK_BOT_SECRET }}
          WORKFLOW_RESULT: ${{ needs.build.result }}
        run: bash .github/scripts/lark-notify.sh "$WORKFLOW_RESULT"
