name: livemask-staging

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-livemask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-livemask}
      POSTGRES_DB: ${POSTGRES_DB:-livemask}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-livemask}"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - livemask-staging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - livemask-staging

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BACKEND_REPO_URL: ${BACKEND_REPO_URL:-https://github.com/MyAiDevs/livemask-backend.git}
        BACKEND_REF: ${BACKEND_REF:-dev}
    restart: unless-stopped
    ports:
      - "${LIVEMASK_BACKEND_HTTP_PORT:-18080}:8080"
    environment:
      PORT: "8080"
      DB_DSN: "postgres://${POSTGRES_USER:-livemask}:${POSTGRES_PASSWORD:-livemask}@postgres:5432/${POSTGRES_DB:-livemask}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      VERSION: "${BACKEND_VERSION:-0.0.0}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - livemask-staging

networks:
  livemask-staging:
    driver: bridge
