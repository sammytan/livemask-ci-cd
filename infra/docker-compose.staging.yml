name: ${LIVEMASK_STACK_NAME:-livemask-staging}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-livemask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-livemask}
      POSTGRES_DB: ${POSTGRES_DB:-livemask}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-livemask}"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - livemask-staging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - livemask-staging

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "${LIVEMASK_BACKEND_HTTP_PORT:-18080}:8080"
    environment:
      PORT: "8080"
      DB_DSN: "postgres://${POSTGRES_USER:-livemask}:${POSTGRES_PASSWORD:-livemask}@postgres:5432/${POSTGRES_DB:-livemask}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      VERSION: "${BACKEND_VERSION:-0.0.0}"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-key-do-not-use-in-production-32chr}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:${LIVEMASK_ADMIN_PORT:-3001},http://127.0.0.1:${LIVEMASK_WEBSITE_PORT:-3002},http://localhost:${LIVEMASK_ADMIN_PORT:-3001},http://localhost:${LIVEMASK_WEBSITE_PORT:-3002}}"
      # Dev-only seed users (optional; never set in production)
      DEV_SEED_USERS: "${DEV_SEED_USERS:-true}"
      DEV_DEFAULT_PASSWORD: "${DEV_DEFAULT_PASSWORD:-DevPass123!}"
      DEV_ADMIN_EMAIL: "${DEV_ADMIN_EMAIL:-admin@livemask.dev}"
      DEV_ADMIN_PASSWORD: "${DEV_ADMIN_PASSWORD:-AdminPass123!}"
      DEV_SPONSOR_EMAIL: "${DEV_SPONSOR_EMAIL:-sponsor@livemask.dev}"
      DEV_SPONSOR_PASSWORD: "${DEV_SPONSOR_PASSWORD:-SponsorPass123!}"
      DEV_AMBASSADOR_EMAIL: "${DEV_AMBASSADOR_EMAIL:-ambassador@livemask.dev}"
      DEV_AMBASSADOR_PASSWORD: "${DEV_AMBASSADOR_PASSWORD:-AmbassadorPass123!}"
      DEV_SUBSCRIBER_EMAIL: "${DEV_SUBSCRIBER_EMAIL:-subscriber@livemask.dev}"
      DEV_SUBSCRIBER_PASSWORD: "${DEV_SUBSCRIBER_PASSWORD:-SubscriberPass123!}"
      DEV_USER_EMAIL: "${DEV_USER_EMAIL:-user@livemask.dev}"
      DEV_USER_PASSWORD: "${DEV_USER_PASSWORD:-UserPass123!}"
      # GeoIP credential encryption (dev-only; production uses a real key)
      GEOIP_CREDENTIAL_ENCRYPTION_KEY: "${GEOIP_CREDENTIAL_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}"
      # Job Service admin gateway (dev/staging runtime)
      JOB_SERVICE_ENABLED: "${JOB_SERVICE_ENABLED:-true}"
      JOB_SERVICE_INTERNAL_URL: "${JOB_SERVICE_INTERNAL_URL:-http://job-service:19191}"
      JOB_SERVICE_AUTH_MODE: "${JOB_SERVICE_AUTH_MODE:-none}"
      JOB_SERVICE_TIMEOUT_SEC: "${JOB_SERVICE_TIMEOUT_SEC:-30}"
      NODEAGENT_CONTROL_URL: "${NODEAGENT_CONTROL_URL:-http://nodeagent:9100}"
      NODEAGENT_CONTROL_NODE_NAME: "${NODEAGENT_CONTROL_NODE_NAME:-local-nodeagent}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - livemask-staging

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        BACKEND_INTERNAL_URL: "http://backend:8080"
    restart: unless-stopped
    ports:
      - "${LIVEMASK_ADMIN_PORT:-3001}:3000"
    environment:
      BACKEND_INTERNAL_URL: "http://backend:8080"
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      backend:
        condition: service_started
    networks:
      - livemask-staging

  website:
    build:
      context: .
      dockerfile: Dockerfile.website
      args:
        VITE_API_BASE_URL: "${PUBLIC_API_BASE_URL:-http://127.0.0.1:${LIVEMASK_BACKEND_HTTP_PORT:-18080}}"
    restart: unless-stopped
    ports:
      - "${LIVEMASK_WEBSITE_PORT:-3002}:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - livemask-staging

  nodeagent:
    build:
      context: .
      dockerfile: Dockerfile.nodeagent
    restart: unless-stopped
    ports:
      - "${LIVEMASK_NODEAGENT_PORT:-19090}:9100"
    environment:
      BACKEND_BASE_URL: "http://backend:8080"
      BACKEND_CONFIG_URL: "http://backend:8080/internal/agent/config"
      NODE_NAME: "${NODE_NAME:-local-nodeagent}"
      NODE_COUNTRY_CODE: "${NODE_COUNTRY_CODE:-US}"
      IDENTITY_PATH: /var/lib/livemask-nodeagent/identity.json
      CREDENTIAL_PATH: /var/lib/livemask-nodeagent/credentials.json
      AGENT_VERSION: "${NODEAGENT_VERSION:-dev}"
      CONFIG_CACHE_PATH: /var/lib/livemask-nodeagent/runtime_config.json
      LISTEN_ADDR: ":9100"
      NODEAGENT_PORT: "9100"
      POLL_INTERVAL_SEC: "${POLL_INTERVAL_SEC:-30}"
      LOG_UPLOAD_ENABLED: "${LOG_UPLOAD_ENABLED:-true}"
      GEOIP_ENABLED: "${GEOIP_ENABLED:-true}"
      GEOIP_PROFILE: "${GEOIP_PROFILE:-country}"
      GEOIP_FORMAT: "${GEOIP_FORMAT:-geoip2-cn-mmdb}"
      NODEAGENT_GEOIP_PROFILE: "${NODEAGENT_GEOIP_PROFILE:-country}"
      NODEAGENT_GEOIP_FORMAT: "${NODEAGENT_GEOIP_FORMAT:-geoip2-cn-mmdb}"
      GEOIP_CHECK_INTERVAL_SEC: "${GEOIP_CHECK_INTERVAL_SEC:-300}"
    volumes:
      - livemask-staging-nodeagent:/var/lib/livemask-nodeagent
    depends_on:
      backend:
        condition: service_started
    networks:
      - livemask-staging

  job-service:
    build:
      context: .
      dockerfile: Dockerfile.jobservice
    restart: unless-stopped
    ports:
      - "${LIVEMASK_JOB_SERVICE_PORT:-19191}:19191"
    environment:
      JOB_SERVICE_CONFIG: "/etc/livemask/job-service.json"
      PORT: "19191"
      DB_DSN: "postgres://${POSTGRES_USER:-livemask}:${POSTGRES_PASSWORD:-livemask}@postgres:5432/${POSTGRES_DB:-livemask}?sslmode=disable"
      JOB_SERVICE_MODE: "staging"
      REDIS_ADDR: "redis:6379"
      JOB_SERVICE_REDIS_ENABLED: "true"
      JOB_SERVICE_INTERNAL_AUTH_ENABLED: "${JOB_SERVICE_INTERNAL_AUTH_ENABLED:-false}"
      BACKEND_INTERNAL_URL: "http://backend:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - livemask-staging

networks:
  livemask-staging:
    driver: bridge

volumes:
  livemask-staging-nodeagent:
