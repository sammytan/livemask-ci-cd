name: livemask-staging

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-livemask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-livemask}
      POSTGRES_DB: ${POSTGRES_DB:-livemask}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-livemask}"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - livemask-staging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - livemask-staging

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BACKEND_REPO_URL: ${BACKEND_REPO_URL:-https://github.com/MyAiDevs/livemask-backend.git}
        BACKEND_REF: ${BACKEND_REF:-dev}
    restart: unless-stopped
    ports:
      - "${LIVEMASK_BACKEND_HTTP_PORT:-18080}:8080"
    environment:
      PORT: "8080"
      DB_DSN: "postgres://${POSTGRES_USER:-livemask}:${POSTGRES_PASSWORD:-livemask}@postgres:5432/${POSTGRES_DB:-livemask}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      VERSION: "${BACKEND_VERSION:-0.0.0}"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-key-do-not-use-in-production-32chr}"
      # Dev-only seed users (optional; never set in production)
      DEV_SEED_USERS: "${DEV_SEED_USERS:-true}"
      DEV_DEFAULT_PASSWORD: "${DEV_DEFAULT_PASSWORD:-DevPass123!}"
      DEV_ADMIN_EMAIL: "${DEV_ADMIN_EMAIL:-admin@livemask.dev}"
      DEV_ADMIN_PASSWORD: "${DEV_ADMIN_PASSWORD:-AdminPass123!}"
      DEV_SPONSOR_EMAIL: "${DEV_SPONSOR_EMAIL:-sponsor@livemask.dev}"
      DEV_SPONSOR_PASSWORD: "${DEV_SPONSOR_PASSWORD:-SponsorPass123!}"
      DEV_AMBASSADOR_EMAIL: "${DEV_AMBASSADOR_EMAIL:-ambassador@livemask.dev}"
      DEV_AMBASSADOR_PASSWORD: "${DEV_AMBASSADOR_PASSWORD:-AmbassadorPass123!}"
      DEV_SUBSCRIBER_EMAIL: "${DEV_SUBSCRIBER_EMAIL:-subscriber@livemask.dev}"
      DEV_SUBSCRIBER_PASSWORD: "${DEV_SUBSCRIBER_PASSWORD:-SubscriberPass123!}"
      DEV_USER_EMAIL: "${DEV_USER_EMAIL:-user@livemask.dev}"
      DEV_USER_PASSWORD: "${DEV_USER_PASSWORD:-UserPass123!}"
      # GeoIP credential encryption (dev-only; production uses a real key)
      GEOIP_CREDENTIAL_ENCRYPTION_KEY: "${GEOIP_CREDENTIAL_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - livemask-staging

  job-service:
    build:
      context: .
      dockerfile: Dockerfile.jobservice
      args:
        JOB_SERVICE_REPO_URL: ${JOB_SERVICE_REPO_URL:-https://github.com/MyAiDevs/livemask-job-service.git}
        JOB_SERVICE_REF: ${JOB_SERVICE_REF:-dev}
    restart: unless-stopped
    ports:
      - "${LIVEMASK_JOB_SERVICE_PORT:-19191}:19191"
    environment:
      PORT: "19191"
      DB_DSN: "postgres://${POSTGRES_USER:-livemask}:${POSTGRES_PASSWORD:-livemask}@postgres:5432/${POSTGRES_DB:-livemask}?sslmode=disable"
      JOB_SERVICE_MODE: "staging"
      BACKEND_INTERNAL_URL: "http://backend:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - livemask-staging

networks:
  livemask-staging:
    driver: bridge
