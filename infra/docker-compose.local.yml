name: livemask-local

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-livemask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-livemask}
      POSTGRES_DB: ${POSTGRES_DB:-livemask}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-livemask}"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - livemask-local-postgres:/var/lib/postgresql/data

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    image: ${BACKEND_GO_IMAGE:-golang:1.25-alpine}
    working_dir: /workspace/livemask-backend
    restart: unless-stopped
    command: ["sh", "-lc", "${BACKEND_COMMAND:-/usr/local/go/bin/go run .}"]
    environment:
      PORT: "8080"
      DB_DSN: "${DB_DSN:-postgres://${POSTGRES_USER:-livemask}:${POSTGRES_PASSWORD:-livemask}@postgres:5432/${POSTGRES_DB:-livemask}?sslmode=disable}"
      REDIS_ADDR: "${REDIS_ADDR:-redis:6379}"
      VERSION: "${BACKEND_VERSION:-dev-local}"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-key-do-not-use-in-production-32chr}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:3001,http://127.0.0.1:3002,http://127.0.0.1:3003,http://localhost:3001,http://localhost:3002,http://localhost:3003}"
      DEV_SEED_USERS: "${DEV_SEED_USERS:-true}"
      DEV_DEFAULT_PASSWORD: "${DEV_DEFAULT_PASSWORD:-DevPass123!}"
      DEV_ADMIN_EMAIL: "${DEV_ADMIN_EMAIL:-admin@livemask.dev}"
      DEV_ADMIN_PASSWORD: "${DEV_ADMIN_PASSWORD:-AdminPass123!}"
      DEV_SPONSOR_EMAIL: "${DEV_SPONSOR_EMAIL:-sponsor@livemask.dev}"
      DEV_SPONSOR_PASSWORD: "${DEV_SPONSOR_PASSWORD:-SponsorPass123!}"
      DEV_AMBASSADOR_EMAIL: "${DEV_AMBASSADOR_EMAIL:-ambassador@livemask.dev}"
      DEV_AMBASSADOR_PASSWORD: "${DEV_AMBASSADOR_PASSWORD:-AmbassadorPass123!}"
      DEV_SUBSCRIBER_EMAIL: "${DEV_SUBSCRIBER_EMAIL:-subscriber@livemask.dev}"
      DEV_SUBSCRIBER_PASSWORD: "${DEV_SUBSCRIBER_PASSWORD:-SubscriberPass123!}"
      DEV_USER_EMAIL: "${DEV_USER_EMAIL:-user@livemask.dev}"
      DEV_USER_PASSWORD: "${DEV_USER_PASSWORD:-UserPass123!}"
      # GeoIP credential encryption (dev-only; production uses a real key)
      GEOIP_CREDENTIAL_ENCRYPTION_KEY: "${GEOIP_CREDENTIAL_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}"
      GOPROXY: "${GOPROXY:-https://goproxy.cn,direct}"
      GOCACHE: /workspace/.cache/go-build
      GOMODCACHE: /workspace/.cache/go/pkg/mod
      PATH: /usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    ports:
      - "${LIVEMASK_BACKEND_HTTP_PORT:-18080}:8080"
    volumes:
      - ../../livemask-backend:/workspace/livemask-backend
      - livemask-local-go-cache:/workspace/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin:
    image: ${ADMIN_NODE_IMAGE:-node:22-alpine}
    profiles: ["admin"]
    working_dir: /workspace/livemask-admin
    restart: unless-stopped
    command: ["sh", "-lc", "npm install --no-audit --no-fund || (rm -rf node_modules && npm install --no-audit --no-fund); npm run dev -- --hostname 0.0.0.0 --port 3000"]
    environment:
      BACKEND_INTERNAL_URL: "http://backend:8080"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${LIVEMASK_ADMIN_PORT:-3001}:3000"
    volumes:
      - ../../livemask-admin:/workspace/livemask-admin
      - livemask-local-admin-node-modules:/workspace/livemask-admin/node_modules
    depends_on:
      - backend

  website:
    image: ${WEBSITE_NODE_IMAGE:-node:22-alpine}
    profiles: ["website"]
    working_dir: /workspace/livemask-website
    restart: unless-stopped
    command: ["sh", "-lc", "npm install --no-audit --no-fund || (rm -rf node_modules && npm install --no-audit --no-fund); npm run dev -- --host 0.0.0.0 --port 5173"]
    environment:
      VITE_API_BASE_URL: "http://127.0.0.1:${LIVEMASK_BACKEND_HTTP_PORT:-18080}"
    ports:
      - "${LIVEMASK_WEBSITE_PORT:-3002}:5173"
    volumes:
      - ../../livemask-website:/workspace/livemask-website
      - livemask-local-website-node-modules:/workspace/livemask-website/node_modules
    depends_on:
      - backend

  nodeagent:
    image: ${NODEAGENT_GO_IMAGE:-golang:1.26-alpine}
    profiles: ["nodeagent"]
    working_dir: /workspace/livemask-nodeagent
    restart: unless-stopped
    command: ["sh", "-lc", "/usr/local/go/bin/go run ./cmd/nodeagent"]
    environment:
      BACKEND_BASE_URL: "${BACKEND_BASE_URL:-http://backend:8080}"
      BACKEND_CONFIG_URL: "${BACKEND_CONFIG_URL:-http://backend:8080/internal/agent/config}"
      NODE_NAME: "${NODE_NAME:-local-nodeagent}"
      IDENTITY_PATH: /workspace/.state/identity.json
      AGENT_VERSION: "${AGENT_VERSION:-dev-local}"
      CONFIG_CACHE_PATH: /workspace/.state/nodeagent-config-cache.json
      LISTEN_ADDR: ":9100"
      POLL_INTERVAL_SEC: "${POLL_INTERVAL_SEC:-30}"
      GOPROXY: "${GOPROXY:-https://goproxy.cn,direct}"
      GOCACHE: /workspace/.cache/go-build
      GOMODCACHE: /workspace/.cache/go/pkg/mod
      PATH: /usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    ports:
      - "${LIVEMASK_NODEAGENT_PORT:-19090}:9100"
    volumes:
      - ../../livemask-nodeagent:/workspace/livemask-nodeagent
      - livemask-local-nodeagent-state:/workspace/.state
      - livemask-local-go-cache:/workspace/.cache
    depends_on:
      - backend

volumes:
  livemask-local-postgres:
  livemask-local-go-cache:
  livemask-local-admin-node-modules:
  livemask-local-website-node-modules:
  livemask-local-nodeagent-state:
